    <linearGradient id="roomB" x1="0" y1="0" x2="340" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFE9DD"/>
      <stop offset="0.52" stop-color="#D2C7B5"/>
      <stop offset="1" stop-color="#8A7B68"/>
